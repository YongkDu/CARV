name: visionllm
channels:
  - defaults
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.10
  - pytorch=2.2.2
  - torchvision
  - pytorch-cuda=12.1
  - numpy=2.2
  - pip
  - pip:
      - opencv-python==4.9.0.80
      - matplotlib
      - transformers
      - accelerate
      - timm
      - git+https://github.com/IDEA-Research/GroundingDINO.git
      - git+https://github.com/facebookresearch/segment-anything.git